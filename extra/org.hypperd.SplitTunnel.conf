<!DOCTYPE busconfig PUBLIC
          "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
          "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <policy user="root">
    <allow own="org.hypperd.SplitTunnel"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.hypperd.SplitTunnel"/>
    <allow receive_sender="org.hypperd.SplitTunnel"/>
  </policy>

</busconfig>
