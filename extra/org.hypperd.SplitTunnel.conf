<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN" "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <policy user="root">
    <allow own="org.hypperd.SplitTunnel" />
  </policy>

  <!-- only root can set the fwmark -->
  <policy context="default">
    <allow send_destination="org.hypperd.SplitTunnel" />
    <allow receive_sender="org.hypperd.SplitTunnel" />

    <deny send_destination="org.hypperd.SplitTunnel" send_interface="org.hypperd.SplitTunnel"
      send_member="SetFwmark" />
    <deny send_destination="org.hypperd.SplitTunnel" send_interface="org.hypperd.SplitTunnel"
      send_member="RemoveFwmark" />
  </policy>

  <!-- only root can set the fwmark -->
  <policy user="root">
    <allow send_destination="org.hypperd.SplitTunnel" />
    <allow receive_sender="org.hypperd.SplitTunnel" />
  </policy>
</busconfig>
